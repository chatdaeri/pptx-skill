<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Cover</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 720pt;
    height: 405pt;
    font-family: Arial, Helvetica, sans-serif;
    background: #1a1a2e;
    color: #ffffff;
    position: relative;
    overflow: hidden;
  }
  .accent-bar {
    position: absolute;
    left: 28pt;
    top: 120pt;
    width: 60pt;
    height: 4pt;
    background: #4dabf7;
  }
  .label {
    position: absolute;
    left: 28pt;
    top: 90pt;
    width: 600pt;
  }
  .label p {
    font-size: 7pt;
    letter-spacing: 3pt;
    color: #4dabf7;
    font-weight: bold;
  }
  .title {
    position: absolute;
    left: 28pt;
    top: 140pt;
    width: 680pt;
  }
  .title h1 {
    font-size: 32pt;
    font-weight: bold;
    color: #ffffff;
    line-height: 1.15;
  }
  .subtitle {
    position: absolute;
    left: 28pt;
    top: 230pt;
    width: 680pt;
  }
  .subtitle p {
    font-size: 12pt;
    color: #b0b8c8;
    line-height: 1.5;
  }
  .footer {
    position: absolute;
    left: 28pt;
    bottom: 40pt;
    width: 680pt;
    display: flex;
    justify-content: space-between;
  }
  .footer p {
    font-size: 8pt;
    color: #8a94a6;
  }
</style>
</head>
<body>
  <div class="label"><p>PPTX SKILL DEMO</p></div>
  <div class="accent-bar"></div>
  <div class="title">
    <h1>간단한 프레젠테이션<br>자동 생성 데모</h1>
  </div>
  <div class="subtitle">
    <p>HTML 슬라이드를 PowerPoint로 변환하는 스킬 시연</p>
  </div>
  <div class="footer">
    <p>Claude Code · pptx-skill</p>
    <p>2026.04.09</p>
  </div>
</body>
</html>
